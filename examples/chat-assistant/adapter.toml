# adapter.toml — chat assistant adapter profile
#
# This file configures adapter-layer routing/capacity policy.
# It is not the kelix core runtime config (see kelix.toml for that).

max_active_sessions = 50
max_global_workers  = 20

[groups.dev-team]
subagents = ["research-agent", "coding-agent", "review-agent", "knowledge-agent"]

[groups.ops-team]
subagents = ["research-agent", "knowledge-agent"]

# [groups.general]
# No entry means all registered subagents are available.
